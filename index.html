          navigator.share(d).catch(() => {});
        } else {
          const t = location.href;
          (navigator.clipboard
            ? navigator.clipboard.writeText(t)
            : Promise.reject()
          )
            .then(() =>
              alert("링크를 복사했어요.\n가족에게 붙여넣어 보내주세요."),
            )
            .catch(() => prompt("이 링크를 복사해 가족에게 보내주세요", t));
        }
      }
      function shot1(sh) {
        if (sh.src) {
          return (
            `<div class="shotwrap"><img src="${sh.src}">` +
            (sh.mk || [])
              .map(
                (m) =>
                  `<span class="mk" style="left:${m[1]}%;top:${m[2]}%"></span>`,
              )
              .join("") +
            `</div>`
          );
        }
        return `<div class="blank"><div class="bt">화면 준비 중</div><div class="bs">${esc(sh.req || "")}</div><div class="reqchip">캡처 요청 필요</div></div>`;
      }
      function shots(s) {
        return `<div class="shots${s.shots.length > 1 ? " two" : ""}">${s.shots.map(shot1).join("")}</div>`;
      }
      function help(s) {
        if (!s.help || !s.help.length) return "";
        return `<details class="help"><summary><span class="q">?</span>도움말<span class="arw">▾</span></summary><ul>${s.help.map((h) => `<li>${esc(h)}</li>`).join("")}</ul></details>`;
      }
      function render() {
        const w = document.getElementById("wrap");
        if (mode === "cover") {
          w.innerHTML = cover();
          return;
        }
        if (mode === "done") {
          w.innerHTML = done();
          return;
        }
        const L = visible();
        if (vi < 0) vi = 0;
        if (vi >= L.length) {
          mode = "done";
          render();
          return;
        }
        const s = L[vi];
        const pct = Math.round(((vi + 1) / L.length) * 100);
        const body =
          s.kind === "choiceSim" || s.kind === "choiceNum"
            ? choice(s)
            : info(s);
        w.innerHTML = `<div class="top"><div class="trow"><img class="clogo" src="${CABSY}"><span class="cnt">${vi + 1} / ${L.length}</span><button class="share" onclick="share()">📤 가족 공유</button></div><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div></div><div class="screen">${body}</div><div class="nav"><button class="btn prev" ${vi === 0 ? "disabled" : ""} onclick="go(-1)">이전</button><button class="btn next" id="nx" onclick="go(1)">${vi === L.length - 1 ? "완료" : "다음 →"}</button></div>`;
        const nx = document.getElementById("nx");
        if (
          (s.kind === "choiceSim" && !sim) ||
          (s.kind === "choiceNum" && !num)
        ) {
          if (nx) nx.disabled = true;
        }
        window.scrollTo(0, 0);
      }
      function info(s) {
        return `<div class="card"><h2 class="title">${esc(s.t)}</h2><div class="cap">화면 예시</div>${shots(s)}<ul class="tips">${(s.tips || []).map((d) => `<li>${esc(d)}</li>`).join("")}</ul></div>`;
      }
      function choice(s) {
        const cur = s.kind === "choiceSim" ? sim : num;
        return `<div class="card"><h2 class="title">${esc(s.t)}</h2><div class="cap">화면 예시</div>${shots(s)}<div class="lab">${esc(s.prompt)}</div><div class="choice">${s.choices.map((c) => `<button class="opt ${cur === c.key ? "sel" : ""}" onclick="pick('${s.kind}','${c.key}')"><span class="on">${c.n}</span><span><span class="ot">${esc(c.label)}</span><span class="od">${esc(c.desc)}</span></span><span class="ck"></span></button>`).join("")}</div><ul class="tips">${(s.tips || []).map((d) => `<li>${esc(d)}</li>`).join("")}</ul></div>`;
      }
      function pick(k, key) {
        if (k === "choiceSim") sim = key;
        else num = key;
        render();
        setTimeout(() => go(1), 200);
      }
      function go(d) {
        const L = visible();
        const s = L[vi];
        if (d > 0 && s) {
          if (s.kind === "choiceSim" && !sim) return;
          if (s.kind === "choiceNum" && !num) return;
        }
        vi += d;
        if (vi < 0) {
          vi = 0;
          mode = "cover";
        }
        render();
      }
      function cover() {
        return `<div class="cover"><img class="clogo" src="${CABSY}"><h1>안심운전 요금제<br><span class="p">가입 따라하기</span></h1><div class="csub">휴대폰만 있으면<br>집에서도 혼자 개통할 수 있어요.</div>${COVER ? `<img class="tx" src="${COVER}">` : ""}<div class="fam">어려우면 가족과 함께 하시면 더 쉬워요.</div><button class="cbtn" onclick="mode='step';vi=0;render()">시작하기</button><button class="sharebig" onclick="share()">📤 가족에게 공유하기</button><div class="credit"><span>요금제 운영</span><img src="${MILES}"></div></div>`;
      }
      function done() {
        return `<div class="screen"><div class="card done"><div class="big">🎉</div><h2>개통이 끝났어요!</h2><p>화면 위에 <b>‘KT’</b>가 뜨고<br>전화·인터넷이 되면 모두 끝난 거예요.<br><br>안 되는 게 있으면<br>캡시 <b>1551-7783</b>(평일 10~18시)로 전화 주세요.</p><button class="sharebig" style="margin-top:18px" onclick="share()">📤 가족에게 공유하기</button></div><div style="text-align:center;margin-top:14px"><button class="btn prev" style="width:auto;padding:13px 24px" onclick="mode='step';vi=visible().length-1;render()">← 이전</button></div></div>`;
      }
      render();
    </script>
  </body>
</html>
